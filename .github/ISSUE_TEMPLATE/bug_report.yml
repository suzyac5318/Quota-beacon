name: Bug report
description: Report a problem with Quota Beacon.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for helping improve Quota Beacon. Please remove any personal account details from screenshots or logs."
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Quota Beacon version
      placeholder: "Example: v0.1.2"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      placeholder: "Describe the problem and what you expected instead."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open the app\n2. ...\n3. ..."
  - type: textarea
    id: extra
    attributes:
      label: Screenshots or logs
      description: "Attach screenshots or logs if helpful. Remove tokens, account IDs, email addresses, and other private data first."
