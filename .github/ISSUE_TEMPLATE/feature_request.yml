name: Feature request
description: Suggest an improvement for Quota Beacon.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: need
    attributes:
      label: What would this help you do?
      placeholder: "Describe the workflow or problem."
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Suggested solution
      placeholder: "Describe the behavior you would like."
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Both
        - Not platform-specific
