name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=high

  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: quota-beacon-windows-unsigned
            build-command: npm run tauri -- build
            artifact-path: src-tauri/target/release/bundle/**
          - os: macos-latest
            artifact-name: quota-beacon-macos-universal-ad-hoc
            build-command: npm run tauri -- build --target universal-apple-darwin
            artifact-path: src-tauri/target/universal-apple-darwin/release/bundle/**
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - name: Install macOS universal targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - run: ${{ matrix.build-command }}
      - name: Verify macOS bundle
        if: runner.os == 'macOS'
        shell: bash
        run: .github/scripts/verify-macos-bundle.sh src-tauri/target/universal-apple-darwin/release/bundle
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            ${{ matrix.artifact-path }}
            quota-beacon-macos-universal-ad-hoc.sha256
          if-no-files-found: error
          retention-days: 14
