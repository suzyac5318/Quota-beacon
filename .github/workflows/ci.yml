name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=high

  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: quota-beacon-windows-unsigned
            build-command: npm run tauri -- build
            artifact-path: src-tauri/target/release/bundle/**
          - os: macos-latest
            artifact-name: quota-beacon-macos-universal-unsigned
            build-command: npm run tauri -- build --target universal-apple-darwin
            artifact-path: src-tauri/target/universal-apple-darwin/release/bundle/**
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install macOS universal targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - run: ${{ matrix.build-command }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 14
